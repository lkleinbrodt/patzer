  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const {
      BarChart, Bar, LineChart, Line, XAxis, YAxis,
      Tooltip, ResponsiveContainer, Cell, ReferenceLine,
    } = Recharts;

    const D = window.BLOG_DATA;

    // ─── colours ───────────────────────────────────────────────────────────
    const INK      = '#1a1a1a';
    const INK_SOFT = '#5b5b5b';
    const INK_FAINT= '#a3a3a3';
    const ACCENT   = '#c44536';
    const PAPER    = '#fafaf7';
    const BORDER   = '#e8e4dc';
    const MONO     = '"JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace';
    const BODY     = '"Kalam", cursive';

    // ─── tiny shared pieces ────────────────────────────────────────────────

    function Mono({ children, size = 11, color = INK_FAINT, weight = 400, style }) {
      return (
        <span style={{ fontFamily: MONO, fontSize: size, color, fontWeight: weight, letterSpacing: '-0.01em', ...style }}>
          {children}
        </span>
      );
    }

    function Tag({ children }) {
      return (
        <Mono size={11} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.1em' }}>
          {children}
        </Mono>
      );
    }

    function LiveDot({ label = 'LIVE', size = 8 }) {
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <span style={{ position: 'relative', display: 'inline-block', width: size, height: size }}>
            <span style={{
              position: 'absolute', inset: 0, borderRadius: '50%', background: '#e63946',
              animation: 'livePulse 1.6s ease-out infinite',
            }} />
            <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: '#e63946' }} />
          </span>
          {label && <Mono size={9} color="#e63946" style={{ letterSpacing: '0.15em', fontWeight: 600 }}>{label}</Mono>}
        </span>
      );
    }

    function Divider({ my = 56 }) {
      return <div style={{ height: 1, background: BORDER, margin: `${my}px 0` }} />;
    }

    function SectionLabel({ children }) {
      return (
        <Mono size={10} color={ACCENT} style={{ textTransform: 'uppercase', letterSpacing: '0.15em', display: 'block', marginBottom: 6 }}>
          {children}
        </Mono>
      );
    }

    function H2({ children, size = 22 }) {
      return (
        <div style={{ fontFamily: BODY, fontSize: size, fontWeight: 700, color: INK, lineHeight: 1.2 }}>
          {children}
        </div>
      );
    }

    function Prose({ children, style }) {
      return (
        <p style={{ fontFamily: BODY, fontSize: 15, lineHeight: 1.8, color: INK_SOFT, margin: 0, ...style }}>
          {children}
        </p>
      );
    }

    function Strong({ children }) {
      return <strong style={{ color: INK, fontWeight: 700 }}>{children}</strong>;
    }

    function Em({ children }) {
      return <em>{children}</em>;
    }

    function VSpace({ h = 16 }) { return <div style={{ height: h }} />; }

    function DataTable({ headers, rows, highlightCol }) {
      return (
        <div style={{ overflowX: 'auto', marginTop: 12 }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: MONO, fontSize: 12 }}>
            <thead>
              <tr>
                {headers.map((h, i) => (
                  <th key={i} style={{
                    textAlign: 'left', padding: '7px 12px',
                    borderBottom: `1.5px solid ${INK}`,
                    color: INK_FAINT, textTransform: 'uppercase',
                    letterSpacing: '0.07em', fontWeight: 500, whiteSpace: 'nowrap',
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => (
                <tr key={ri} style={{ borderBottom: `1px solid ${BORDER}` }}>
                  {row.map((cell, ci) => (
                    <td key={ci} style={{
                      padding: '8px 12px',
                      color: (highlightCol !== undefined && ci === highlightCol) ? ACCENT : INK,
                      fontWeight: (highlightCol !== undefined && ci === highlightCol) ? 700 : 400,
                    }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─── lichess data hook ─────────────────────────────────────────────────
    // POST /api/users returns an array of user objects.
    // We also fetch the latest v4 Elo from /api/user/patzer_v4.

    const BOT_USERNAMES = ['patzer_v1', 'patzer_v2b', 'patzer_v3', 'patzer_v4'];

    function useLichessUsers() {
      const [users, setUsers] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        const body = BOT_USERNAMES.join(',');
        fetch('https://lichess.org/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body,
        })
          .then(r => r.json())
          .then(data => {
            // index by lowercase id
            const map = {};
            for (const u of data) map[u.id.toLowerCase()] = u;
            setUsers(map);
          })
          .catch(err => setError(err.message));
      }, []);

      return { users, error };
    }

    // ─── hero section ──────────────────────────────────────────────────────

    function MetricCell({ label, big, sub, live, ticker, isCard }) {
      const inner = (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', minHeight: 14 }}>
            <Mono size={10} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              {label}
            </Mono>
            {live && <LiveDot label="" size={6} />}
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5, marginTop: 6 }}>
            <span style={{ fontFamily: BODY, fontSize: 22, fontWeight: 700, lineHeight: 1, letterSpacing: '-0.02em', color: INK }}>
              {big}
            </span>
            {ticker && <Mono size={11} color={ACCENT}>↑</Mono>}
          </div>
          <Mono size={11} color={INK_SOFT} style={{ display: 'block', marginTop: 4 }}>{sub}</Mono>
        </>
      );
      if (isCard) {
        return (
          <div style={{
            background: '#fff', border: `1px solid #d8d4cc`, borderRadius: 6, padding: 12,
          }}>
            {inner}
          </div>
        );
      }
      return <div style={{ padding: '2px 0' }}>{inner}</div>;
    }

    function HeroSection({ users }) {
      // Pull live data if available
      const v4 = users?.['patzer_v4'];
      const allBots = BOT_USERNAMES.map(n => users?.[n]).filter(Boolean);
      const totalGames = allBots.reduce((s, u) => s + (u?.count?.all ?? 0), 0);

      const liveElo = v4?.perfs?.blitz?.rating ?? v4?.perfs?.bullet?.rating ?? null;
      const eloDisplay = liveElo ? liveElo.toLocaleString() : '—';
      const gamesDisplay = totalGames > 0 ? totalGames.toLocaleString() : '—';
      const eloSub = liveElo ? 'v4 · blitz' : 'v4 · blitz (loading…)';

      const metrics = [
        { label: 'lichess elo',     big: eloDisplay,   sub: eloSub,               live: true },
        { label: 'games played',    big: gamesDisplay, sub: 'all bots · vs human', live: true, ticker: true },
        { label: 'training games',  big: '36M',        sub: 'lichess open db' },
        { label: 'training tokens', big: '2.85B',      sub: 'v4 train split · UCI tokenized' },
        { label: 'parameters',      big: '40M',        sub: '12L · 8H · 512d' },
      ];

      return (
        <section>
          <Tag>side project · ongoing</Tag>
          <VSpace h={10} />
          <h1 style={{
            fontFamily: BODY, fontSize: 'clamp(28px, 5vw, 40px)', fontWeight: 700,
            lineHeight: 1.05, letterSpacing: '-0.02em', color: INK, margin: 0,
          }}>
            A small transformer learning chess
          </h1>
          <VSpace h={12} />
          <p style={{ fontFamily: BODY, fontSize: 15, color: INK_SOFT, fontStyle: 'italic', margin: 0 }}>
            no search, no eval function — next-token prediction on a few billion moves
          </p>

          <VSpace h={28} />

          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 20,
            padding: '14px 0', borderTop: `1px solid ${BORDER}`, borderBottom: `1px solid ${BORDER}`,
          }}>
            {metrics.map((m, i) => <MetricCell key={i} {...m} />)}
          </div>

          <VSpace h={20} />

          <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
            <a
              href="https://lichess.org/@/patzer_v4"
              style={{
                background: ACCENT, color: '#fff', padding: '10px 18px',
                borderRadius: 6, fontSize: 14, fontWeight: 700, textDecoration: 'none',
                fontFamily: BODY,
              }}
            >
              Challenge on Lichess →
            </a>
            <a
              href="https://github.com/lkleinbrodt/patzer"
              style={{
                display: 'inline-flex', alignItems: 'center',
                border: `1.5px solid ${INK}`, borderRadius: 6, padding: '9px 15px',
                fontSize: 14, fontWeight: 500, color: INK, textDecoration: 'none',
                fontFamily: BODY,
              }}
            >
              github / patzer
            </a>
          </div>
        </section>
      );
    }

    // ─── the question ──────────────────────────────────────────────────────

    function QuestionSection() {
      return (
        <section>
          <H2 size={22}>The question</H2>
          <VSpace h={16} />
          <Prose>
            I broke my wrist last spring and, looking for a one-handed hobby, fell hard into chess. A few
            weeks of late-night blitz games later, I started doing what any ML person does when they get
            into something: thinking about how I'd build a bot to play it for me.
          </Prose>
          <VSpace h={14} />
          <Prose>
            The obvious paths are well-trodden — classical engine with alpha-beta search (Stockfish), or
            policy network with RL and self-play (AlphaZero). Both are great. Both are also a lot of code.
            I was looking at PGN exports of my own games one night and the thought clicked:{' '}
            <Strong>this is just a sequence of tokens.</Strong> Each move is a discrete symbol. A game is
            a sequence. Predicting the next move given the previous ones is exactly the problem language
            models were built to solve.
          </Prose>
          <VSpace h={14} />
          <Prose>
            DeepMind's <Em>Searchless Chess</Em> paper (Ruoss et al., 2024) already proved the idea works
            at scale — 270M parameters, grandmaster strength, no search at inference time. That answered
            "is it possible?" The question that got me to open a terminal was different:{' '}
            <Strong>can a regular ML person, on a laptop with cheap rented GPUs, build a credible
            version of this?</Strong> What does it take? How far can a hobbyist get? When does it stop
            working?
          </Prose>
          <VSpace h={14} />
          <Prose>
            I named the project Patzer (chess slang for a weak player). Four versions in, the strongest
            plays around 1560 Elo in offline evaluation against Stockfish — and early Lichess data
            suggests it plays stronger than that against humans. Here's what I learned.
          </Prose>
        </section>
      );
    }

    // ─── result section ────────────────────────────────────────────────────

    const VERSIONS = D.models.models;

    function VersionStepper() {
      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 0 }}>
          {VERSIONS.map((v, i) => {
            const isCurrent = i === VERSIONS.length - 1;
            return (
              <div key={v.version} style={{ position: 'relative', paddingRight: i < 3 ? 16 : 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: '50%', flexShrink: 0,
                    background: isCurrent ? ACCENT : '#fff',
                    border: `2px solid ${isCurrent ? ACCENT : INK}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontFamily: MONO, fontSize: 10, fontWeight: 700,
                    color: isCurrent ? '#fff' : INK,
                  }}>
                    {i + 1}
                  </div>
                  {i < 3 && <div style={{ flex: 1, height: 1, borderTop: `1.5px dashed ${INK_FAINT}` }} />}
                </div>
                <Mono size={12} weight={700} color={isCurrent ? ACCENT : INK}
                  style={{ display: 'block', marginTop: 10 }}>
                  {v.version} · {v.headline}
                </Mono>
                <Mono size={10} color={INK_FAINT} style={{ display: 'block', marginTop: 2 }}>
                  {v.sub}
                </Mono>
                {v.elo_delta !== null && (
                  <Mono size={11} color={isCurrent ? ACCENT : INK_SOFT}
                    style={{ display: 'block', marginTop: 4 }}>
                    {v.elo_delta > 0 ? '+' : ''}{Math.round(v.elo_delta)} elo
                  </Mono>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    const ELO_CHART_COLOR = ACCENT;

    function EloBarChart() {
      const data = VERSIONS.map(v => ({
        version: v.version,
        elo: Math.round(v.elo_stockfish),
        stderr: v.elo_stderr,
        isCurrent: v.version === 'v4',
      }));

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div style={{
            background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 4,
            padding: '8px 12px', fontFamily: MONO, fontSize: 11,
          }}>
            <div style={{ color: INK, fontWeight: 700 }}>{d.version}</div>
            <div style={{ color: INK_SOFT }}>Elo {d.elo} ± {d.stderr}</div>
          </div>
        );
      };

      return (
        <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 6, padding: '16px 20px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
            <Mono size={10} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              stockfish-ladder elo · offline eval
            </Mono>
            <Mono size={9} color={INK_FAINT}>(Bradley-Terry, anchored to Stockfish)</Mono>
          </div>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={data} margin={{ top: 4, right: 8, bottom: 0, left: 0 }} barCategoryGap="28%">
              <XAxis dataKey="version" tick={{ fontFamily: MONO, fontSize: 11, fill: INK_SOFT }} axisLine={false} tickLine={false} />
              <YAxis domain={[1000, 1700]} tick={{ fontFamily: MONO, fontSize: 10, fill: INK_FAINT }} axisLine={false} tickLine={false} width={38} />
              <Tooltip content={<CustomTooltip />} cursor={{ fill: 'rgba(0,0,0,0.03)' }} />
              <Bar dataKey="elo" radius={[3, 3, 0, 0]}>
                {data.map((d, i) => (
                  <Cell key={i} fill={d.isCurrent ? ACCENT : '#c0bab0'} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{ display: 'flex', gap: 24, paddingTop: 4 }}>
            {data.map(d => (
              <Mono key={d.version} size={10} color={d.isCurrent ? ACCENT : INK_FAINT}
                style={{ fontWeight: d.isCurrent ? 700 : 400 }}>
                {d.version} · {d.elo}
              </Mono>
            ))}
          </div>
        </div>
      );
    }

    function LiveLeaderboard({ users }) {
      const rows = [
        { key: 'patzer_v1',  label: 'patzer_v1',  href: 'https://lichess.org/@/patzer_v1'  },
        { key: 'patzer_v2b', label: 'patzer_v2b', href: 'https://lichess.org/@/patzer_v2b' },
        { key: 'patzer_v3',  label: 'patzer_v3',  href: 'https://lichess.org/@/patzer_v3'  },
        { key: 'patzer_v4',  label: 'patzer_v4',  href: 'https://lichess.org/@/patzer_v4'  },
      ];

      const elo = (u, mode) => u?.perfs?.[mode]?.rating ?? '—';
      const games = (u) => u?.count?.all?.toLocaleString() ?? '—';

      const headerStyle = {
        padding: '10px 14px', color: INK_FAINT,
        textTransform: 'uppercase', letterSpacing: '0.08em',
        fontFamily: MONO, fontSize: 10,
      };
      const cellStyle = (bold) => ({
        padding: '10px 14px', fontFamily: MONO, fontSize: 12,
        color: bold ? INK : INK_SOFT, fontWeight: bold ? 700 : 400,
      });

      return (
        <div style={{ border: `1px solid ${BORDER}`, borderRadius: 6, overflow: 'hidden', background: '#fff' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', borderBottom: `1px solid ${BORDER}` }}>
            <Mono size={10} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              live ratings — all bots
            </Mono>
            <LiveDot label="" size={6} />
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${BORDER}` }}>
                {['bot', 'bullet', 'blitz', 'games', ''].map((h, i) => (
                  <th key={i} style={{ ...headerStyle, textAlign: 'left' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => {
                const u = users?.[r.key];
                const isLast = i === rows.length - 1;
                return (
                  <tr key={r.key} style={{
                    borderBottom: isLast ? 'none' : `1px solid #f1efe9`,
                    background: isLast ? 'rgba(196,69,54,0.06)' : 'transparent',
                  }}>
                    <td style={cellStyle(isLast)}>{r.label}</td>
                    <td style={cellStyle(false)}>{elo(u, 'bullet')}</td>
                    <td style={cellStyle(isLast)}>{elo(u, 'blitz')}</td>
                    <td style={cellStyle(false)}>{games(u)}</td>
                    <td style={{ ...cellStyle(false), textAlign: 'right' }}>
                      <a href={r.href} style={{ color: isLast ? ACCENT : INK_SOFT, textDecoration: 'none', fontFamily: MONO, fontSize: 11 }}>
                        challenge →
                      </a>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {!users && (
            <div style={{ padding: '8px 14px', borderTop: `1px solid ${BORDER}` }}>
              <Mono size={10} color={INK_FAINT}>fetching from lichess.org…</Mono>
            </div>
          )}
        </div>
      );
    }

    function ResultSection({ users }) {
      return (
        <section>
          <H2 size={22}>The result, so far</H2>
          <VSpace h={4} />
          <p style={{ fontFamily: BODY, fontSize: 13, color: INK_SOFT, fontStyle: 'italic', margin: 0 }}>
            four versions, four experiments — live Lichess ratings update on page load
          </p>
          <VSpace h={24} />
          <VersionStepper />
          <VSpace h={28} />
          <EloBarChart />
          <VSpace h={20} />
          <LiveLeaderboard users={users} />
        </section>
      );
    }

    // ─── finding 01 ────────────────────────────────────────────────────────

    const LOSS_DATA = D.loss_curves.versions.v1 || [];

    function ValLossChart() {
      // Downsample to ~20 points for a clean chart
      const step = Math.max(1, Math.floor(LOSS_DATA.length / 22));
      const data = LOSS_DATA.filter((_, i) => i === 0 || i % step === 0 || i === LOSS_DATA.length - 1);

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        return (
          <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 4, padding: '7px 10px', fontFamily: MONO, fontSize: 10 }}>
            <div style={{ color: INK_SOFT }}>iter {payload[0].payload.iter.toLocaleString()}</div>
            <div style={{ color: INK_SOFT }}>train {payload[1]?.value?.toFixed(3)}</div>
            <div style={{ color: ACCENT, fontWeight: 700 }}>val {payload[0]?.value?.toFixed(3)}</div>
          </div>
        );
      };

      return (
        <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 6, padding: '16px 20px' }}>
          <Mono size={10} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>
            val loss vs training iterations — v1 (40k steps)
          </Mono>
          <VSpace h={12} />
          <ResponsiveContainer width="100%" height={140}>
            <LineChart data={data} margin={{ top: 4, right: 8, bottom: 0, left: 0 }}>
              <XAxis
                dataKey="iter"
                tickFormatter={v => `${v/1000}k`}
                tick={{ fontFamily: MONO, fontSize: 10, fill: INK_FAINT }}
                axisLine={false} tickLine={false}
              />
              <YAxis
                domain={[1.7, 'auto']}
                tick={{ fontFamily: MONO, fontSize: 10, fill: INK_FAINT }}
                axisLine={false} tickLine={false} width={34}
              />
              <Tooltip content={<CustomTooltip />} />
              <Line dataKey="train_loss" stroke={INK_FAINT} strokeWidth={1.5} dot={false} strokeDasharray="3 2" />
              <Line dataKey="val_loss"   stroke={ACCENT}    strokeWidth={2}   dot={false} />
            </LineChart>
          </ResponsiveContainer>
          <VSpace h={6} />
          <div style={{ display: 'flex', gap: 16 }}>
            <span style={{ fontFamily: MONO, fontSize: 10, color: INK_FAINT }}>
              <span style={{ display: 'inline-block', width: 16, height: 2, background: ACCENT, verticalAlign: 'middle', marginRight: 5 }} />
              val loss
            </span>
            <span style={{ fontFamily: MONO, fontSize: 10, color: INK_FAINT }}>
              <span style={{ display: 'inline-block', width: 16, height: 2, background: INK_FAINT, verticalAlign: 'middle', marginRight: 5, opacity: 0.6 }} />
              train loss
            </span>
          </div>
        </div>
      );
    }

    function Finding01() {
      return (
        <div style={{ marginBottom: 52 }}>
          <SectionLabel>Finding 01</SectionLabel>
          <H2 size={20}>Your eval metric is lying to you (a little)</H2>
          <VSpace h={14} />
          <Prose>
            When you train a model like this, you have three different ways to ask "is it any good?" —
            and they tell you three pretty different stories.
          </Prose>
          <VSpace h={16} />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {[
              { n: '1', label: 'Validation loss', desc: "Standard ML metric. How well does the model predict held-out moves it's never seen?" },
              { n: '2', label: 'Stockfish ladder', desc: 'Offline eval: play against Stockfish at capped strengths, fit Bradley–Terry, get an Elo.' },
              { n: '3', label: 'Lichess',          desc: 'Deploy as a bot. Play real humans. Get a live rating. This is the wild.' },
            ].map(({ n, label, desc }) => (
              <div key={n} style={{
                border: `1px dashed ${BORDER}`, borderRadius: 6, padding: 14,
              }}>
                <Mono size={10} color={ACCENT} style={{ letterSpacing: '0.1em' }}>#{n}</Mono>
                <div style={{ fontFamily: BODY, fontSize: 14, fontWeight: 700, color: INK, marginTop: 5 }}>
                  {label}
                </div>
                <VSpace h={6} />
                <Prose style={{ fontSize: 12 }}>{desc}</Prose>
              </div>
            ))}
          </div>
          <VSpace h={16} />
          <Prose>
            Here's what those three yardsticks said going from v3 (40M params, 11M training games) to
            v4 (same architecture, 36M games — 3.3× more data):
          </Prose>
          <DataTable
            headers={['Metric', 'v3', 'v4', 'v4 advantage']}
            rows={[
              ['Val loss',            '1.514', '1.501', '+0.013 nats'],
              ['Stockfish-ladder Elo', '1,561', '1,380*', '−181 Elo (early ckpt)'],
              ['Lichess rating',       '—',    'live ↑',  'see leaderboard above'],
            ]}
            highlightCol={3}
          />
          <VSpace h={6} />
          <Mono size={10} color={INK_FAINT}>
            * v4 evaluated at 40k iterations only; training continued. The true best-checkpoint Elo is higher.
          </Mono>
          <VSpace h={16} />
          <Prose>
            By validation loss, v4 is essentially a tie. A rounding error. If you'd shown me just that
            number I'd have shrugged. The lesson generalizes well past chess:{' '}
            <Strong>your training metric, your offline eval, and your production performance are three
            different things, and the gaps between them are information.</Strong>
          </Prose>
          <VSpace h={16} />
          <Prose>
            Even <Em>within</Em> a single training run, val loss and chess skill decouple. The val loss
            curve is extremely steep — you get roughly 99% of your improvement in the first 10k
            iterations. The remaining iterations are a long tail of tiny drops. But when late checkpoints
            play each other, the later one dominates consistently.
          </Prose>
          <VSpace h={16} />
          <ValLossChart />
        </div>
      );
    }

    // ─── finding 02 ────────────────────────────────────────────────────────

    function Finding02() {
      const data = VERSIONS.map(v => ({
        version: v.version,
        elo: Math.round(v.elo_stockfish),
        isCurrent: v.version === 'v4',
      }));

      return (
        <div style={{ marginBottom: 52 }}>
          <SectionLabel>Finding 02</SectionLabel>
          <H2 size={20}>One knob at a time</H2>
          <VSpace h={14} />
          <Prose>
            Each version of Patzer changed exactly one thing. v1 → v2 told me data helps a lot when the
            model is undertrained. v2 → v3 told me that once you have enough data, capacity helps. v3 → v4
            told me that on this architecture, more data delivers diminishing returns on validation loss —
            even though it still helps in real play.
          </Prose>
          <VSpace h={16} />
          <DataTable
            headers={['Version', 'Parameters', 'Training games', 'What changed']}
            rows={[
              ['v1', '12M', '1M',  'baseline'],
              ['v2', '12M', '11M', '10× more data, same architecture'],
              ['v3', '40M', '11M', '3× larger model, same data'],
              ['v4', '40M', '36M', '3.3× more data + WSD lr schedule'],
            ]}
          />
          <VSpace h={16} />
          <Prose>
            That diagnostic loop — train it, see what's bottlenecked, fix that one thing, find the new
            bottleneck — is the actual skill. The chess part is incidental.
          </Prose>
          <VSpace h={16} />
          <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 6, padding: '16px 20px' }}>
            <Mono size={10} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              stockfish-ladder elo · v1 → v4
            </Mono>
            <VSpace h={12} />
            <ResponsiveContainer width="100%" height={130}>
              <BarChart data={data} margin={{ top: 4, right: 8, bottom: 0, left: 0 }} barCategoryGap="36%">
                <XAxis dataKey="version" tick={{ fontFamily: MONO, fontSize: 11, fill: INK_SOFT }} axisLine={false} tickLine={false} />
                <YAxis domain={[1000, 1700]} tick={{ fontFamily: MONO, fontSize: 10, fill: INK_FAINT }} axisLine={false} tickLine={false} width={38} />
                <Bar dataKey="elo" radius={[3, 3, 0, 0]}>
                  {data.map((d, i) => (
                    <Cell key={i} fill={d.isCurrent ? ACCENT : '#c0bab0'} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      );
    }

    // ─── finding 03 ────────────────────────────────────────────────────────

    function Finding03() {
      const cplData = D.cpl_by_move.buckets.map(b => ({
        label: b.label,
        cpl: b.avg_cpl,
        n: b.n,
      }));

      const CustomTooltip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 4, padding: '7px 10px', fontFamily: MONO, fontSize: 10 }}>
            <div style={{ color: INK, fontWeight: 700 }}>moves {d.label}</div>
            <div style={{ color: ACCENT }}>avg CPL {d.cpl}</div>
            <div style={{ color: INK_FAINT }}>{d.n.toLocaleString()} moves analyzed</div>
          </div>
        );
      };

      return (
        <div style={{ marginBottom: 40 }}>
          <SectionLabel>Finding 03</SectionLabel>
          <H2 size={20}>The bot blunders the transition, not the opening</H2>
          <VSpace h={14} />
          <Prose>
            Centipawn loss is lowest in moves 1–10 — openings are essentially memorised from training data.
            It spikes in the 11–20 range as the game exits book and the model must plan for itself,
            then stays elevated through the endgame.
          </Prose>
          <VSpace h={10} />
          <Prose>
            Tactical one-move threats are handled surprisingly well — the model has seen enough puzzles in
            training to recognise most. What it can't do is plan 6–8 moves ahead in a quiet position,
            which is precisely what endgames and post-opening transitions require.
          </Prose>
          <VSpace h={16} />
          <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 6, padding: '16px 20px' }}>
            <Mono size={10} color={INK_FAINT} style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              avg centipawn loss by move · lichess bot games (capped at 500 cp)
            </Mono>
            <VSpace h={12} />
            <ResponsiveContainer width="100%" height={140}>
              <BarChart data={cplData} margin={{ top: 4, right: 8, bottom: 0, left: 0 }} barCategoryGap="20%">
                <XAxis dataKey="label" tick={{ fontFamily: MONO, fontSize: 11, fill: INK_SOFT }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fontFamily: MONO, fontSize: 10, fill: INK_FAINT }} axisLine={false} tickLine={false} width={34} />
                <Tooltip content={<CustomTooltip />} cursor={{ fill: 'rgba(0,0,0,0.03)' }} />
                <Bar dataKey="cpl" radius={[3, 3, 0, 0]}>
                  {cplData.map((d, i) => (
                    <Cell key={i} fill={i === 0 ? '#a8c8a0' : i <= 1 ? '#e0b080' : ACCENT} opacity={0.8} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
            <VSpace h={4} />
            <Mono size={10} color={INK_FAINT}>
              from {cplData.reduce((s, b) => s + b.n, 0).toLocaleString()} analyzed bot moves across {D.phase_stats.by_version.reduce((s, v) => s + v.games, 0)} lichess games
            </Mono>
          </div>
        </div>
      );
    }

    // ─── learnings wrapper ─────────────────────────────────────────────────

    function LearningsSection() {
      return (
        <section>
          <H2 size={22}>Three things I learned</H2>
          <VSpace h={32} />
          <Finding01 />
          <Finding02 />
          <Finding03 />
        </section>
      );
    }

    // ─── what's next ───────────────────────────────────────────────────────

    function WhatsNextSection() {
      return (
        <section>
          <H2 size={22}>What's next</H2>
          <VSpace h={6} />
          <Prose style={{ color: INK_SOFT }}>
            v4's diagnosis is clear: it's capacity-bound. The model is no longer overfitting — there's
            room for a bigger model to do better.
          </Prose>
          <VSpace h={20} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div style={{ border: `1px dashed ${BORDER}`, borderRadius: 6, padding: 18 }}>
              <Mono size={11} color={INK_FAINT}>v5 · planned</Mono>
              <div style={{ fontFamily: BODY, fontSize: 15, fontWeight: 700, color: INK, marginTop: 6, lineHeight: 1.2 }}>
                Scale the architecture
              </div>
              <VSpace h={8} />
              <Prose style={{ fontSize: 13 }}>
                More layers and width on the same 36M-game corpus. Capacity is the binding constraint — the
                model has room to grow.
              </Prose>
            </div>
            <div style={{ border: `1px dashed ${BORDER}`, borderRadius: 6, padding: 18 }}>
              <Mono size={11} color={INK_FAINT}>v6 · planned</Mono>
              <div style={{ fontFamily: BODY, fontSize: 15, fontWeight: 700, color: INK, marginTop: 6, lineHeight: 1.2 }}>
                Data quality experiments
              </div>
              <VSpace h={8} />
              <Prose style={{ fontSize: 13 }}>
                Two paths: (1) tighter Elo filter — 2200+ only, fewer games but stronger moves. (2)
                Stockfish-annotated training data, predicting the engine's best move. That's the route
                DeepMind took — the most likely path to a big jump.
              </Prose>
            </div>
          </div>
          <VSpace h={20} />
          <Prose style={{ color: INK_SOFT }}>
            The bots are still running — v1 through v4 are live on Lichess and play whoever challenges them.
            The bigger open question:{' '}
            <Strong>how far does pure next-token prediction from human games actually go?</Strong> What does
            it take to crack 2000? 2200? Where does the approach plateau, and which lever — capacity, data
            quantity, data quality, training signal — is binding at each level?
          </Prose>
        </section>
      );
    }

    // ─── footer ────────────────────────────────────────────────────────────

    function Footer() {
      const links = [
        { label: 'github',           href: 'https://github.com/lkleinbrodt/patzer' },
        { label: 'lichess',          href: 'https://lichess.org/@/patzer_v4' },
        { label: 'nanoGPT',          href: 'https://github.com/karpathy/nanoGPT' },
        { label: 'searchless chess', href: 'https://arxiv.org/abs/2402.04494' },
      ];
      return (
        <footer style={{ borderTop: `1px solid ${BORDER}`, paddingTop: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
            {links.map(({ label, href }) => (
              <a key={label} href={href}
                style={{ fontFamily: MONO, fontSize: 11, color: INK_SOFT, textDecoration: 'none' }}>
                {label}
              </a>
            ))}
          </div>
          <Mono size={11} color={INK_FAINT}>
            updated {new Date(D.models.generated_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
          </Mono>
        </footer>
      );
    }

    // ─── app ───────────────────────────────────────────────────────────────

    function App() {
      const { users } = useLichessUsers();

      return (
        <div style={{ maxWidth: 780, margin: '0 auto', padding: 'clamp(24px, 4vw, 60px) clamp(20px, 4vw, 40px)' }}>
          <HeroSection users={users} />
          <Divider my={60} />
          <QuestionSection />
          <Divider my={60} />
          <ResultSection users={users} />
          <Divider my={60} />
          <LearningsSection />
          <Divider my={60} />
          <WhatsNextSection />
          <Divider my={48} />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
